    <script>
      const map = createMap(L);
      const routeOverlay = L.layerGroup();
      routeOverlay.addTo(map);
      const stationOverlay = L.layerGroup();
      stationOverlay.addTo(map);
      const spotOverlay = L.layerGroup();
      spotOverlay.addTo(map);
      const gpxOverlay = L.layerGroup();
      gpxOverlay.addTo(map);
      const layerControl = initMap(L, map, {
        宿場: stationOverlay,
        見どころ: spotOverlay,
        おすすめ歩行ルート: routeOverlay,
        "kagaorange の軌跡": gpxOverlay,
      });
      activateJinsokuMap(L, layerControl);
      activateKonjakuMap(L, layerControl, "tokyo50", "00");
      activateKonjakuMap(L, layerControl, "kanto", "00");
      activateKonjakuMap(L, layerControl, "kanto", "01");

      // Stations
      const stations = [
        { name: "日本橋", coordinate: [35.684112, 139.774533] },
        { name: "1. 平尾追分", coordinate: [35.749627, 139.714079] },
        { name: "2. 上板橋宿", coordinate: [35.752904, 139.694163] },
        { name: "3. 下練馬宿", coordinate: [35.765745, 139.667025] },
        { name: "4. 白子宿", coordinate: [35.781349, 139.623785] },
        { name: "5. 膝折宿", coordinate: [35.792577, 139.583056] },
        { name: "6. 大和田宿", coordinate: [35.807698, 139.554751] },
        { name: "7. 大井宿", coordinate: [35.851458, 139.516912] },
        { name: "8. 川越城", coordinate: [35.924836, 139.485455] },
      ];
      const stationLayer = L.featureGroup();
      setMarkers(L, stationOverlay, stationLayer, stations);
      initQueryParamUpdater(map, () => map.fitBounds(stationLayer.getBounds()));

      // Spots
      const spots = [

            '「旧中山道から分岐した旧川越街道と当時の通称 "高田道" が交叉する十字路を四ツ又と称しました」' +
            "とあります。馬印や毛槍を担いでいる大名行列の挿絵も添えられています。",
          pictures: [
            {
              url: "https://kaidotrail.github.io/img/kagaorange/2025/05-05/IMG_20250505_132034.webp",
              comment: "案内板",
            },
            {
              url: "https://kaidotrail.github.io/img/kagaorange/2025/05-05/IMG_20250505_132034_edit.webp",
              comment: "四ツ又名称の由来",

          icon: "guide",

            "地名の由来は2つの説があり、1つ目は現在の養育院あたりに丘岡があってこれを大山と呼んでいたこと、そして" +
            "2つ目は大山詣の街道がここを通っていたからとのことです。川越街道の道中には大山道を示す道標もあるため、" +
            "街道ウォーカーとしては2つ目の説を推したいところです。",
          url: "https://haro.or.jp/about/history.html",
          pictures: [

              url: "https://kaidotrail.github.io/img/kagaorange/2025/05-05/IMG_20250505_132406.webp",

              url: "https://kaidotrail.github.io/img/kagaorange/2025/05-05/IMG_20250505_133051.webp",

        {
          name: "旧道分岐",
          coordinate: [35.760333, 139.677851],
          icon: "guide",
