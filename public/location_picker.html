  <body>
    <!-- prettier-ignore -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-MTM7SMZG"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <a href="./" class="logo-link"><img src="lib/logo160.png" alt="旧街道足跡マップ" /></a>
    <h1 style="padding-top: 3px">
      <span class="hidden-on-mobile" style="margin-right: 6px">
        <a href="./"><span class="logo-font">旧街道足跡マップ</span> α版</a>
        <span class="sep">&gt;</span>
        地図座標取得ツール
      </span>
      <label style="color: green; font-family: monospace">
        座標:
        <input id="location" size="24" class="padding-top: 0" />
      </label>
      <label
        for="history"
        style="
          font-family: monospace;
          user-select: none;
          cursor: pointer;
          color: white;
          background: gray;
          border: solid 1px black;
          padding: 2px;
          margin-left: 3px;
          margin-right: 6px;
        "
      >
        履歴
        <button id="history" style="display: none"></button>
      </label>
      <label
        for="gpx-file"
        style="
          font-family: monospace;
          user-select: none;
          cursor: pointer;
          color: white;
          background: gray;
          border: solid 1px black;
          padding: 2px;
        "
      >
        GPX...
        <input id="gpx-file" name="file" type="file" multiple style="display: none" />
      </label>
    </h1>
    <div id="map" style="cursor: crosshair; display: block"></div>
    <pre
      id="log"
      style="
        position: absolute;
        top: 30px;
        bottom: 0;
        right: 0;
        left: 0;
        margin: 0;
        padding: 20px;
        color: lightgreen;
        background: black;
        display: none;
        overflow-y: scroll;
      "
    ></pre>
    <script>
      const buttonHistory = document.getElementById("history");
      const log = document.getElementById("log");
      buttonHistory.addEventListener("click", () => {
        log.style.display = log.style.display === "block" ? "none" : "block";
        const mapElm = document.getElementById("map");
        mapElm.style.display = mapElm.style.display === "none" ? "block" : "none";
      });
      const inputLocation = document.getElementById("location");
      inputLocation.addEventListener("focus", () => inputLocation.select());
      const map = createMap(L);
      const layerControl = initMap(L, map);
      activateKonjakuMap(L, layerControl, "kanto", "00");
      activateKonjakuMap(L, layerControl, "matsumoto", "00");
      activateKonjakuMap(L, layerControl, "chukyo", "2man");
      activateKonjakuMap(L, layerControl, "omi", "2man");
      activateKonjakuMap(L, layerControl, "keihansin", "2man");
      initQueryParamUpdater(map, () => map.setView([35.6839621, 139.7743418], 13));
      map.on("click", (e) => {
        const lat = Math.round(e.latlng.lat * 10000000) / 10000000;
        const lng = Math.round(e.latlng.lng * 10000000) / 10000000;
        inputLocation.setAttribute("value", lat + "," + lng);
        navigator.clipboard.writeText(lat + "," + lng);
        log.innerHTML = log.innerHTML + "[" + lat + ", " + lng + "],\n";
        L.featureGroup().addLayer(
          L.marker([lat, lng])
            .addTo(map)
            .bindPopup(lat + "," + lng),
        );
      });
      const buttonGpxFile = document.getElementById("gpx-file");
      buttonGpxFile.addEventListener(
        "change",
        () => {
          const bounds = L.latLngBounds();
          for (const file of buttonGpxFile.files) {
            const url = window.URL.createObjectURL(file);
            new L.GPX(url, {
              async: true,
              polyline_options: { color: "lime", weight: 2 },
              markers: { startIcon: null, endIcon: null },
            })
              .on("error", (e) => console.error("GPX の読み込みに失敗しました: " + String(e)))
              .on("loaded", async (e) => {
                window.URL.revokeObjectURL(url);
                await navigator.locks.request("gpx-files", async () => {
                  bounds.extend(e.target.getBounds());
                  map.fitBounds(bounds);
                });
              })
              .addTo(map);
          }
        },
        false,
      );
    </script>
