    <!-- prettier-ignore -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-MTM7SMZG"

    <h1>
      <a href="./"><span class="logo-font">旧街道足跡マップ</span></a>
      <span class="sep">&gt;</span>
      <span id="route-entry">東海道53次+佐屋街道</span>
      <span id="select-entry"></span>
    </h1>
    <div id="map"></div>
    <div id="own-gpx" class="non-map-screen"></div>
    <script>
      const map = createMap(L);
      const routeOverlay = L.layerGroup();
      routeOverlay.addTo(map);
      const sayaRouteOverlay = L.layerGroup();
      sayaRouteOverlay.addTo(map);
      const stationOverlay = L.layerGroup();
      stationOverlay.addTo(map);
      const spotOverlay = L.layerGroup();
      spotOverlay.addTo(map);
      const gpxOverlay = L.layerGroup();
      gpxOverlay.addTo(map);
      const layerControl = initMap(L, map, {
        宿場: stationOverlay,
        見どころ: spotOverlay,
        おすすめ歩行ルート: routeOverlay,
        佐屋街道ルート: sayaRouteOverlay,
        "kagaorange の軌跡": gpxOverlay,
      });
      activateJinsokuMap(L, layerControl);
      activateKonjakuMap(L, layerControl, "kanto", "00");
      activateKonjakuMap(L, layerControl, "hamamatsu", "2man");
      activateKonjakuMap(L, layerControl, "chukyo", "2man");
      activateKonjakuMap(L, layerControl, "tsu", "2man");
      activateKonjakuMap(L, layerControl, "omi", "2man");
      activateKonjakuMap(L, layerControl, "keihansin", "2man");

      // Stations
      const stations = [
        { name: "日本橋", coordinate: [35.684112, 139.774533] },
        { name: "1. 品川宿", coordinate: [35.61854, 139.743724] },
        { name: "2. 川崎宿", coordinate: [35.533824, 139.7045732] },
        { name: "3. 神奈川宿", coordinate: [35.4713393, 139.6318692] },
        { name: "4. 保土ヶ谷宿", coordinate: [35.443983, 139.595361] },
        { name: "5. 戸塚宿", coordinate: [35.399964, 139.531243] },
        { name: "6. 藤沢宿", coordinate: [35.347657, 139.482875] },
        { name: "7. 平塚宿", coordinate: [35.327526, 139.337804] },
        { name: "8. 大磯宿", coordinate: [35.3095308, 139.31539] },
        { name: "9. 小田原宿", coordinate: [35.248539, 139.160528] },
        { name: "10. 箱根宿", coordinate: [35.19036, 139.026265] },
        { name: "11. 三島宿", coordinate: [35.119414, 138.914498] },
        { name: "12. 沼津宿", coordinate: [35.096174, 138.856841] },
        { name: "13. 原宿", coordinate: [35.12528, 138.797865] },
        { name: "14. 吉原宿", coordinate: [35.162509, 138.68749] },
        { name: "15. 菅原宿", coordinate: [35.120074, 138.605538] },
        { name: "16. 由比宿", coordinate: [35.107556, 138.567349] },
        { name: "17. 興津宿", coordinate: [35.049537, 138.518895] },
        { name: "18. 江尻宿", coordinate: [35.019858, 138.480931] },
        { name: "19. 府中宿", coordinate: [34.975066, 138.389043] },
        { name: "20. 丸子宿", coordinate: [34.949536, 138.3406109] },
        { name: "21. 岡部宿", coordinate: [34.919366, 138.282415] },
        { name: "22. 藤枝宿", coordinate: [34.8698415, 138.2523984] },
        { name: "23. 島田宿", coordinate: [34.832822, 138.176276] },
        { name: "24. 金谷宿", coordinate: [34.822805, 138.128835] },
        { name: "25. 日坂宿", coordinate: [34.80429, 138.075123] },
        { name: "26. 掛川宿", coordinate: [34.772972, 138.015907] },
        { name: "27. 袋井宿", coordinate: [34.7471797, 137.9222828] },
        { name: "28. 見附宿", coordinate: [34.726966, 137.857465] },
        { name: "29. 浜松宿", coordinate: [34.7051582, 137.728579] },
        { name: "30. 舞阪宿", coordinate: [34.684658, 137.609126] },
        { name: "31. 新居宿", coordinate: [34.695095, 137.559055] },
        { name: "32. 白須賀宿", coordinate: [34.6885263, 137.5009078] },
        { name: "33. 二川宿", coordinate: [34.7238503, 137.450037] },
        { name: "34. 吉田宿", coordinate: [34.766693, 137.389667] },
        { name: "35. 御油宿", coordinate: [34.844966, 137.317314] },
        { name: "36. 赤坂宿", coordinate: [34.85572, 137.308176] },
        { name: "37. 藤川宿", coordinate: [34.911319, 137.222118] },
        { name: "38. 岡崎宿", coordinate: [34.957589, 137.17067] },
        { name: "39. 池鯉鮒宿", coordinate: [35.008151, 137.041077] },
        { name: "40. 鳴海宿", coordinate: [35.080514, 136.949721] },
        { name: "41. 宮宿", coordinate: [35.120435, 136.906752] },
        { name: "42. 桑名宿", coordinate: [35.068438, 136.696021] },
        { name: "43. 四日市宿", coordinate: [34.969823, 136.625168] },
        { name: "44. 石薬師宿", coordinate: [34.904301, 136.548035] },
        { name: "45. 庄野宿", coordinate: [34.8833479, 136.5247339] },
        { name: "46. 亀山宿", coordinate: [34.854623, 136.454432] },
        { name: "47. 関宿", coordinate: [34.8524327, 136.3924849] },
        { name: "48. 坂下宿", coordinate: [34.8888043, 136.3535553] },
        { name: "49. 土山宿", coordinate: [34.9348223, 136.2823856] },
        { name: "50. 水口宿", coordinate: [34.966174, 136.182069] },
        { name: "51. 石部宿", coordinate: [35.0100117, 136.0547251] },
        { name: "68. 草津宿", coordinate: [35.0177048, 135.9603757] },
        { name: "69. 大津宿", coordinate: [35.005952, 135.861515] },
        { name: "三条大橋", coordinate: [35.009044, 135.771801] },
      ];
      const stationLayer = L.featureGroup();
      setMarkers(L, stationOverlay, stationLayer, stations);
      initQueryParamUpdater(map, () => map.fitBounds(stationLayer.getBounds()));

      // Spots
      const spots = [];
      initSpots(L, map, spotOverlay, spots);

      // Route
      L.polyline(tokaidoEastRoute, { color: "red", weight: 5 }).addTo(routeOverlay);
      L.polyline(tokaidoWestRoute, { color: "red", weight: 5 }).addTo(routeOverlay);
      L.polyline(kusatsuToSanjyoRoute, { color: "red", weight: 5 }).addTo(routeOverlay);
      L.polyline(sayaRoute, { color: "lightcoral", weight: 5 }).addTo(sayaRouteOverlay);

      // GPX
      setGpx(L, gpxOverlay, "gpx/kagaorange_2023-10-14.gpx", "blue"); // #1 日本橋→横浜
      setGpx(L, gpxOverlay, "gpx/kagaorange_2023-10-28.gpx", "blue"); // #2 横浜→大磯
      setGpx(L, gpxOverlay, "gpx/kagaorange_2023-11-03.gpx", "blue"); // #3 大磯→箱根関所
      setGpx(L, gpxOverlay, "gpx/kagaorange_2023-11-25.gpx", "blue"); // #4 箱根関所→片浜
      setGpx(L, gpxOverlay, "gpx/kagaorange_2023-12-16.gpx", "blue"); // #5-6 片浜→興津, 興津→静岡
      setGpx(L, gpxOverlay, "gpx/kagaorange_2023-12-23.gpx", "blue"); // #7-9 静岡→島田, 島田→袋井, 袋井→舞阪
      setGpx(L, gpxOverlay, "gpx/kagaorange_2024-01-27.gpx", "blue"); // #10-12 舞阪→豊橋, 豊橋→岡崎, 岡崎→熱田
      setGpx(L, gpxOverlay, "gpx/kagaorange_2024-03-30.gpx", "blue"); // #13-14 熱田→桑名, 桑名→井田川
      setGpx(L, gpxOverlay, "gpx/kagaorange_2024-05-02.gpx", "blue"); // #5-18 井田川→関, 関→水口, 水口→大津, 大津→京都御所
    </script>
