    <h1>
      <a href="./"><span class="logo-font">旧街道足跡マップ</span> α版</a>
      <span class="sep">&gt;</span>
      奥州街道 (白河以南)
    </h1>
    <div id="map"></div>
    <script>
      const map = createMap(L);
      const routeOverlay = L.layerGroup();
      routeOverlay.addTo(map);
      const stationOverlay = L.layerGroup();
      stationOverlay.addTo(map);
      const spotOverlay = L.layerGroup();
      spotOverlay.addTo(map);
      const gpxOverlay = L.layerGroup();
      gpxOverlay.addTo(map);
      const layerControl = initMap(L, map, {
        宿場: stationOverlay,
        見どころ: spotOverlay,
        おすすめ歩行ルート: routeOverlay,
        "kagaorange の軌跡": gpxOverlay,
      });
      activateKonjakuMap(L, layerControl, "kanto", "00");
      activateKonjakuMap(L, layerControl, "kanto", "01");

      // Stations
      const stations = [
        { name: "17. 宇都宮宿", coordinate: [36.56177, 139.877192] },
        { name: "18. 白沢宿", coordinate: [36.632525, 139.9437457] },
        { name: "19. 氏家宿", coordinate: [36.679781, 139.967574] },
        { name: "20. 喜連川宿", coordinate: [36.71873, 140.025853] },
        { name: "21. 佐久山宿", coordinate: [36.807937, 140.009884] },
        { name: "22. 大田原宿", coordinate: [36.865249, 140.02463] },
        { name: "23. 鍋掛宿", coordinate: [36.9437096, 140.1038682] },
        { name: "24. 越堀宿", coordinate: [36.945941, 140.104949] },
        { name: "25. 芦野宿", coordinate: [36.989512, 140.163206] },
        { name: "26. 白坂宿", coordinate: [37.078146, 140.1911581] },
        { name: "27. 白河宿", coordinate: [37.126858, 140.215489] },
      ];
      const stationLayer = L.featureGroup();
      setMarkers(L, stationOverlay, stationLayer, stations);
      initQueryParamUpdater(map, () => map.fitBounds(stationLayer.getBounds()));

      // Spots
      const spots = [];
      const spotLayer = L.featureGroup();
      setMarkers(L, spotOverlay, spotLayer, spots);
      initIconUpdater(L, map, spotLayer, spots);
      initPopupSlider(spotLayer);

      // Route
      L.polyline(oshuRoute, { color: "red", weight: 5 }).addTo(routeOverlay);

      // GPX
      setGpx(L, gpxOverlay, "gpx/kagaorange_2025-01-24.gpx", "blue"); // #1-3 宇都宮→喜連川, 喜連川→鍋掛, 鍋掛→白河
    </script>
