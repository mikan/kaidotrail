      const routeOverlay = L.layerGroup();
      routeOverlay.addTo(map);
      const altRouteOverlay = L.layerGroup();
      altRouteOverlay.addTo(map);
      const stationOverlay = L.layerGroup();
      stationOverlay.addTo(map);
      const spotOverlay = L.layerGroup();
      spotOverlay.addTo(map);
      const gpxOverlay = L.layerGroup();
      gpxOverlay.addTo(map);
      initMap(
        L,
        map,
        {
          宿場: stationOverlay,
          見どころ: spotOverlay,
          おすすめ歩行ルート: routeOverlay,
          宮山ルート: altRouteOverlay,
          "kagaorange の軌跡": gpxOverlay,
        },
        true,
      );

      // Stations
      const stations = [
        { name: "虎ノ門", coordinate: [35.671, 139.74963] },
        { name: "小杉御殿", coordinate: [35.583699, 139.654171] },
        { name: "佐江戸", coordinate: [35.519346, 139.560225] },
        { name: "川井御殿", coordinate: [35.484725, 139.519156] },
        { name: "瀬谷", coordinate: [35.457092, 139.47816] },
        { name: "用田", coordinate: [35.40425, 139.412956] },
        { name: "中原御殿", coordinate: [35.34383, 139.33061] },
        { name: "平塚宿", coordinate: [35.327507, 139.337769] },
      ];
      const stationLayer = L.featureGroup();
      setMarkers(L, stationOverlay, stationLayer, stations);
      initQueryParamUpdater(map, () => map.fitBounds(stationLayer.getBounds()));
