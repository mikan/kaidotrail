    <title>旧街道足跡マップ α版 &ndash; 中原街道</title>

  <body>
    <img src="logo160.png" alt="旧街道足跡マップ" />
    <h1>
      <a href="./"><span class="logo-font">旧街道足跡マップ</span> α版</a>
      <span class="sep">&gt;</span>
      中原街道
    </h1>
    <div id="map"></div>
    <script>
      const map = L.map("map");
      const routeOverlay = L.layerGroup();
      routeOverlay.addTo(map);
      const stationOverlay = L.layerGroup();
      stationOverlay.addTo(map);
      const spotOverlay = L.layerGroup();
      spotOverlay.addTo(map);
      const gpxOverlay = L.layerGroup();
      gpxOverlay.addTo(map);
      initMap(L, map, {
        宿場: stationOverlay,
        見どころ: spotOverlay,
        おすすめ歩行ルート: routeOverlay,
        "kagaorange の軌跡": gpxOverlay,
      });

      // Stations
      const stations = [
        { name: "虎ノ門", coordinate: [35.671, 139.74963], kana: "とらのもん" },
        { name: "小杉御殿", coordinate: [35.583699, 139.654171], kana: "こすぎごてん" },
        { name: "佐江戸", coordinate: [35.519346, 139.560225], kana: "さえど" },
        { name: "川井御殿", coordinate: [35.484725, 139.519156], kana: "かわいごてん" },
        { name: "瀬谷", coordinate: [35.457092, 139.47816], kana: "せや" },
        { name: "用田", coordinate: [35.40425, 139.412956], kana: "ようだ" },
        { name: "中原御殿", coordinate: [35.34383, 139.33061], kana: "なかはらごてん" },
        { name: "平塚宿", coordinate: [35.327507, 139.337769], kana: "ひらつかしゅく" },
      ];
      const stationLayer = L.featureGroup();
      setMarkers(L, stationOverlay, stationLayer, stations);
      initQueryParamUpdater(map, () => map.fitBounds(stationLayer.getBounds()));

      // Spots
      const spots = [
        {
          name: "江戸城外堀跡",
          coordinate: [35.670794, 139.748685],
          icon: "monument",
          description:
            "虎ノ門駅の11番出入口の半地下部に外堀跡の展示室があります。" +
            "石垣は寛永13年 (1636年) に築かれたあと幾度も改修された跡があり、担当した大名の刻印も確認できるそうです。",
          pictures: [
            {
              url: "https://kaidotrail.github.io/img/kagaorange/2024/06-29/PXL_20240628_205857856.webp",
              comment: "地下展示室",
            },
            {
              url: "https://kaidotrail.github.io/img/kagaorange/2024/06-29/PXL_20240628_205909039.webp",
              comment: "石垣の様子",
            },
          ],
        },
        {
          name: "金刀比羅宮",
          kana: "ことひらぐう",
          coordinate: [35.6697045, 139.7481591],
          icon: "shrine",
          description:
            "讃岐国丸亀藩主が建てた神社で、延宝七年 (1679) よりこの地に鎮座しているそうです。" +
            "社殿の正面にある銅製の鳥居は文政4年 (1821) 製。" +
            "裏鳥居横にある百度石は、この石に触れてから拝殿でお参りするという往復を100回繰り返せば願いが届くと言われているそうです。",
          pictures: [
            {
              url: "https://kaidotrail.github.io/img/kagaorange/2024/06-29/PXL_20240628_210344050.webp",
              comment: "裏鳥居",
            },
            {
              url: "https://kaidotrail.github.io/img/kagaorange/2024/06-29/PXL_20240628_210412896.webp",
              comment: "銅鳥居",
            },
            {
              url: "https://kaidotrail.github.io/img/kagaorange/2024/06-29/PXL_20240628_210431193.webp",
              comment: "百度石",
            },
          ],
        },
        {
          name: "愛宕神社",
          kana: "あたごじんじゃ",
          coordinate: [35.6647362, 139.7484595],
          icon: "shrine",
          description:
            "慶長8年 (1603) に徳川家康の命により防火の神様として祀られた神社。" +
            "愛宕山 (26m) の頂上にあり、これは東京23区内の自然の地形としての最高峰です。" +
            "東側の参道にある階段は出世の石段と呼ばれています。これは徳川家光が石段の上の梅の枝を馬で採ってくるものはいないかと呼びかけ、挑戦し成功を納めた丸亀藩の家臣が馬術の名人として後に名を馳せたことに由来するそうです。",
          pictures: [
            {
              url: "https://kaidotrail.github.io/img/kagaorange/2024/06-29/PXL_20240628_212517698.MP.webp",
              comment: "丹塗りの門と茅の輪くぐり",
            },
            {
              url: "https://kaidotrail.github.io/img/kagaorange/2024/06-29/PXL_20240628_212627012.webp",
              comment: "社殿",
            },
            {
              url: "https://kaidotrail.github.io/img/kagaorange/2024/06-29/PXL_20240628_212449905.webp",
              comment: "出世の階段",
            },
          ],
        },
        {
          name: "麻布台の旧道跡",
          coordinate: [35.6607744, 139.7430843],
          icon: "guide",
          description: "かつての街道は直角に曲がっていました。",
          pictures: [
            {
              url: "https://kaidotrail.github.io/img/kagaorange/2024/06-29/PXL_20240628_213958550.webp",
              comment: "[京方] 右手に進む",
            },
          ],
        },
        {
          name: "赤羽橋親柱",
          coordinate: [35.6543279, 139.7449833],
          icon: "monument",
          description: "先代の赤羽橋の親柱が保存されています。",
          pictures: [
            {
              url: "https://kaidotrail.github.io/img/kagaorange/2024/06-29/PXL_20240628_220230998.webp",
              comment: "親柱",
            },
          ],
        },
        {
          name: "丸子の渡し跡 (左岸)",
          coordinate: [35.583029, 139.671413],
          icon: "watashi",
          description:
            "多摩川と交差するここには昭和9年 (1934) に丸子橋が完成するまで丸子の渡しが通っていました。" +
            "説明板には、かつてこの地は丸子荘という荘園であったことや、道興准后の廻国雑記に言及があることなどが紹介されています。",
          pictures: [
            {
              url: "https://kaidotrail.github.io/img/kagaorange/2024/06-29/PXL_20240629_055137395.webp",
              comment: "説明板",
            },
          ],
        },
        {
          name: "丸子の渡し跡 (右岸)",
          coordinate: [35.5831467, 139.6666843],
          icon: "watashi",
          description:
            "土手を下るところに記念碑があります。" +
            "「始まりは江戸時代初期とされ、江戸と平塚の中原を結ぶ中原街道にかかる渡し。" +
            "平塚のお酢や相州の物産も渡った。1935 (昭和10) 年の丸子橋架橋で廃止。」と記載されています。",
          pictures: [
            {
              url: "https://kaidotrail.github.io/img/kagaorange/2024/06-29/PXL_20240629_060410600.webp",
              comment: "記念碑",
            },
          ],
        },
        {
          name: "御主殿稲荷 (小杉御殿跡)",
          kana: "ごしゅでんいなり (こすぎごてんあと)",
          coordinate: [35.583706, 139.654165],
          icon: "shrine",
          description:
            "小杉御殿の御主殿跡には小さな稲荷社が鎮座しています。<br/>" +
            "説明板には、小杉御殿は二代目将軍秀忠が建てたこと、家康の送迎や鷹狩りの休憩所などに使われていたことなどが紹介されています。",
          pictures: [
            {
              url: "https://kaidotrail.github.io/img/kagaorange/2024/06-29/PXL_20240629_063045991.webp",
              comment: "稲荷社",
            },
            {
              url: "https://kaidotrail.github.io/img/kagaorange/2024/06-29/PXL_20240629_063120907.webp",
              comment: "説明板",
            },
          ],
        },
        {
          name: "港北ニュータウン・イオ",
          coordinate: [35.5426198, 139.5857728],
          icon: "guide",
          description:
            "[京方] 中原街道の道筋は住宅地で分断されていますが、住宅地内は通行可能です。",
          pictures: [
            {
              url: "https://kaidotrail.github.io/img/kagaorange/2024/06-29/PXL_20240629_085313068.webp",
              comment: "案内板",
            },
            {
              url: "https://kaidotrail.github.io/img/kagaorange/2024/06-29/PXL_20240629_085406324.webp",
              comment: "住宅地内の通路",
            },
          ],
        },
        {
          name: "案内標柱",
          coordinate: [35.481981, 139.513219],
          icon: "guide",
          description:
            "[京方] 階段を登ります。<br/>" +
            "標柱には「旧中原街道」「平塚の中原から江戸の虎ノ門に通じる旧街道」「1590年 家康が江戸入城の時利用した」などと書かれています。",
          pictures: [
            {
              url: "https://kaidotrail.github.io/img/kagaorange/2024/07-20/PXL_20240719_223937399.webp",
              comment: "階段の様子",
            },
            {
              url: "https://kaidotrail.github.io/img/kagaorange/2024/07-20/PXL_20240719_223945985.webp",
              comment: "標柱",
            },
          ],
        },
        {
          name: "矢指一里塚跡",
          coordinate: [35.479254, 139.510495],
          icon: "ichirizuka",
          description:
            "標柱によると、中山の宮下 (現緑区中山町) へ一里、桜株 (現大和市上和田) へ一里とのことですが、江戸からは何里なのかは言及がありません。" +
            "手元の地図で測った限りでは9里ほどでしょうか。",
          pictures: [
            {
              url: "https://kaidotrail.github.io/img/kagaorange/2024/07-20/PXL_20240719_224934486.webp",
              comment: "標柱",
            },
          ],
        },
        {
          name: "三ツ境の地下道",
          coordinate: [35.4704699, 139.4965357],
          icon: "guide",
          description: "地下道で線路の反対側に行くことができます。",
        },
        {
          name: "立川橋の廃道",
          coordinate: [35.438737, 139.445716],
          icon: "guide",
          description: "立川橋を経由するかつての道筋は廃道になり現在は通行できません。",
          pictures: [
            {
              url: "https://kaidotrail.github.io/img/kagaorange/2024/07-20/PXL_20240720_014751848.MP.webp",
              comment: "廃道区間南端",
            },
            {
              url: "https://kaidotrail.github.io/img/kagaorange/2024/07-20/PXL_20240720_014718005.webp",
              comment: "立川橋",
            },
          ],
        },
        {
          name: "中原一里塚跡",
          coordinate: [35.3476156, 139.3321753],
          icon: "ichirizuka",
          description: "この場所の道の両側に塚があったそうですが、現存しません。",
          pictures: [
            {
              url: "https://kaidotrail.github.io/img/kagaorange/2024/07-27/PXL_20240727_091336719.webp",
              comment: "標柱",
            },
          ],
        },
        {
          name: "中原御殿跡",
          coordinate: [35.3438088, 139.3305552],
          icon: "monument",
          description:
            "中原御殿跡は現在小学校になっていますが、体育館建設に伴う発掘調査が行われ井戸跡などの遺構が見つかったそうです。",
          pictures: [
            {
              url: "https://kaidotrail.github.io/img/kagaorange/2024/07-27/PXL_20240727_092235075.webp",
              comment: "石碑・説明板",
            },
            {
              url: "https://kaidotrail.github.io/img/kagaorange/2024/07-27/PXL_20240727_092256924.webp",
              comment: "説明板",
            },
            {
              url: "https://kaidotrail.github.io/img/kagaorange/2024/07-27/PXL_20240727_092419091.webp",
              comment: "消防団のシャッターにペイントされた中原御殿",
            },
          ],
        },
        {
          name: "善徳寺",
          coordinate: [35.3410871, 139.3255341],
          icon: "temple",
          description: "浄土宗のお寺。山門は中原御殿の屋敷門を移築したものと伝わっています。",
          pictures: [
            {
              url: "https://kaidotrail.github.io/img/kagaorange/2024/07-27/PXL_20240727_093142141.webp",
              comment: "山門",
            },
            {
              url: "https://kaidotrail.github.io/img/kagaorange/2024/07-27/PXL_20240727_093108367.MP.webp",
              comment: "説明板",
            },
          ],
        },
      ];
      const spotLayer = L.featureGroup();
      setMarkers(L, spotOverlay, spotLayer, spots);
      initIconUpdater(L, map, stationLayer, spotLayer, spots);
      initPopupSlider(spotLayer);

      // Route
      L.polyline(nakaharaRoute, { color: "red", weight: 5 }).addTo(routeOverlay);

      // GPX
      setGpx(L, gpxOverlay, "gpx/kagaorange_2024-06-29.gpx", "blue"); // #1 虎ノ門→中山
      setGpx(L, gpxOverlay, "gpx/kagaorange_2024-07-20.gpx", "blue"); // #2 中山→寒川
      setGpx(L, gpxOverlay, "gpx/kagaorange_2024-07-27.gpx", "blue"); // #3 寒川→平塚
    </script>
  </body>
</html>
